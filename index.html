<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>GPT-5.6 Sol 测试</title>
  <style>
    :root {
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #f3f6ff;
      background: #090d18;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 18% 8%, rgba(73, 123, 255, .28), transparent 34rem),
        radial-gradient(circle at 82% 72%, rgba(31, 211, 169, .16), transparent 30rem),
        #090d18;
    }
    main { width: min(1080px, calc(100% - 36px)); margin: 0 auto; padding: 86px 0; }
    .eyebrow { color: #76a7ff; font-size: 13px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
    h1 { max-width: 760px; margin: 14px 0; font-size: clamp(42px, 8vw, 84px); line-height: .98; letter-spacing: -.055em; }
    .intro { max-width: 620px; color: #aeb9ce; font-size: 17px; line-height: 1.8; }
    .projects { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; margin-top: 54px; }
    .project {
      min-height: 250px;
      padding: 25px;
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      background: rgba(18, 25, 43, .72);
      box-shadow: 0 24px 70px rgba(0,0,0,.28);
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
      display: flex;
      flex-direction: column;
    }
    .project:hover { transform: translateY(-5px); border-color: rgba(118,167,255,.7); background: rgba(25,35,59,.9); }
    .preview {
      height: 118px;
      border-radius: 13px;
      background:
        radial-gradient(ellipse at 67% 38%, #71c8f7 0 12%, #3988eb 35%, transparent 56%),
        linear-gradient(135deg, #173bb0, #3079e6 55%, #6ac4f4);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.13);
    }
    .project h2 { margin: 22px 0 8px; font-size: 21px; }
    .project p { margin: 0; color: #9ba8be; line-height: 1.65; }
    .open { margin-top: auto; padding-top: 22px; color: #85afff; font-weight: 650; }
    footer { margin-top: 58px; color: #718098; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">HTML Experiments</div>
    <h1>GPT-5.6 Sol 测试</h1>
    <p class="intro">这是一个静态网页作品集合。每个项目都放在独立文件夹中，并通过文件夹里的 <code>index.html</code> 直接访问。</p>
    <section class="projects" aria-label="项目列表">
      <a class="project" href="./windows-11-web/">
        <div class="preview" aria-hidden="true"></div>
        <h2>Windows 11 Web Desktop</h2>
        <p>使用单文件 HTML、CSS、JavaScript 与 SVG 实现的可交互 Windows 11 桌面。</p>
        <span class="open">进入项目 →</span>
      </a>
    </section>
    <footer>后续新增项目时，只需创建新的子文件夹并在这里添加入口。</footer>
  </main>
</body>
</html>
